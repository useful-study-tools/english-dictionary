<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}多機能英単語辞書{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 必要に応じてカスタムCSSをここに追加 */
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <header class="bg-indigo-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="text-xl font-bold tracking-wider hover:text-indigo-200 transition-colors">
                VocabDiction
            </a>
            <nav class="space-x-4">
                <a href="/" class="hover:underline">ホーム</a>
                <a href="/exercise.html" class="hover:underline">演習</a>
                <div class="inline-block relative ml-4">
                    <input type="text" id="searchInput" placeholder="単語を検索..." class="px-3 py-1 rounded-full text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-300 text-sm">
                    <div id="searchResults" class="absolute w-full mt-1 bg-white text-black rounded-md shadow-lg hidden z-50 max-h-60 overflow-y-auto"></div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-gray-800 text-gray-300 text-center py-4 mt-auto">
        <div class="container mx-auto px-4 text-sm">
            &copy; 2026 VocabDiction Project. All rights reserved.
        </div>
    </footer>

    <script>
        // 軽量インデックスを用いたインクリメンタル検索の基礎ロジック
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        let searchIndex = [];

        // 検索インデックスの非同期読み込み
        fetch('/api/search_index.json')
            .then(res => res.json())
            .then(data => { searchIndex = data; })
            .catch(err => console.error("インデックスの読み込みに失敗しました:", err));

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            searchResults.innerHTML = '';
            
            if (query.length === 0) {
                searchResults.classList.add('hidden');
                return;
            }

            // 前方一致や部分一致でフィルタリング（最大10件）
            const matches = searchIndex.filter(item => item.w.toLowerCase().includes(query)).slice(0, 10);
            
            if (matches.length > 0) {
                matches.forEach(match => {
                    const a = document.createElement('a');
                    a.href = '/' + match.u;
                    a.className = 'block px-4 py-2 hover:bg-indigo-50 border-b border-gray-100 last:border-0';
                    a.innerHTML = `<span class="font-bold">${match.w}</span> <span class="text-xs text-gray-500 ml-2">${match.m}</span>`;
                    searchResults.appendChild(a);
                });
                searchResults.classList.remove('hidden');
            } else {
                searchResults.classList.add('hidden');
            }
        });

        // 枠外クリックで検索結果を閉じる
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
